{% extends 'base.html' %}

{% block content %}

<section class="about">

<h2>Artwork Gallery</h2>

<div class="cards">

{% for blog in blogs %}

<div class="card">

<img src="{{ blog.image.url }}">

<h3>{{ blog.title }}</h3>

<p>

{{ blog.short_description }}

</p>

<a href="{% url 'blog_detail' blog.slug %}" class="btn">

View Artwork

</a>

</div>

{% empty %}

<p>No artwork uploaded yet.</p>

{% endfor %}

</div>

</section>

{% endblock %}
