{% extends 'base.html' %}

{% block content %}

<section class="about">

<div class="detail-card">

<h1>
{{ blog.title }}
</h1>

<img src="{{ blog.image.url }}" class="detail-image">

<p class="detail-description">
{{ blog.description }}
</p>

<div class="detail-meta">

<p>
<strong>Artist:</strong> {{ blog.artist }}
</p>

<p>
Published: {{ blog.created_at }}
</p>

</div>

</div>

</section>

{% endblock %}
