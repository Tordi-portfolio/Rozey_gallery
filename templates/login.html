{% extends 'base.html' %}

{% block content %}

<div class="login-container">

    <div class="login-card">

        <h1>Rozey Gallery Admin</h1>

        <p>Administrator Login</p>

        {% if messages %}

            {% for message in messages %}

                <div class="alert">

                    {{ message }}

                </div>

            {% endfor %}

        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <input
                type="text"
                name="username"
                placeholder="Username"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <button type="submit">

                Login

            </button>

        </form>

    </div>

</div>

{% endblock %}
