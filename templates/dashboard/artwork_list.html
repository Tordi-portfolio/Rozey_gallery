{% extends 'base.html' %}

{% block content %}

<div class="container">

<h1>Manage Artworks</h1>

<table>

<tr>

<th>Image</th>

<th>Title</th>

<th>Artist</th>

<th>Actions</th>

</tr>

{% for artwork in artworks %}

<tr>

<td>

<img src="{{ artwork.image.url }}" width="120">

</td>

<td>{{ artwork.title }}</td>

<td>{{ artwork.artist }}</td>

<td>

<a href="{% url 'edit_artwork' artwork.id %}">

Edit

</a>

|

<a href="{% url 'delete_artwork' artwork.id %}">

Delete

</a>

</td>

</tr>

{% endfor %}

</table>

</div>

{% endblock %}
